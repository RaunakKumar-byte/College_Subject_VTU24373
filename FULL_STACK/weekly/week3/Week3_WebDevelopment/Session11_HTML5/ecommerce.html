<!DOCTYPE html>
<html>
<head>
<title>Ecommerce Filters</title>
<style>
body {
    font-family: Arial, sans-serif;
    max-width: 600px;
    margin: 0 auto;
    padding: 20px;
    background-color: #f9f9f9;
}

h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #333;
}

label {
    display: block;
    margin-top: 15px;
    font-weight: bold;
    color: #555;
}

input[type="range"], select, input[type="color"] {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 16px;
}

input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    height: 10px;
    background: #ddd;
    outline: none;
}

input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 20px;
    height: 20px;
    background: #007bff;
    cursor: pointer;
    border-radius: 50%;
}

input[type="range"]::-moz-range-thumb {
    width: 20px;
    height: 20px;
    background: #007bff;
    cursor: pointer;
    border-radius: 50%;
    border: none;
}
</style>
</head>
<body>

<h2>Product Filters</h2>

<form>
<label>Price Range</label>
<input type="range" min="0" max="10000" value="5000">

<label>Brand</label>
<select>
<option>Apple</option>
<option>Samsung</option>
<option>HP</option>
</select>

<label>Color</label>
<input type="color" value="#ff0000">

<label>Rating</label>
<select>
<option>4★+</option>
<option>3★+</option>
</select>
</form>

</body>
</html>
