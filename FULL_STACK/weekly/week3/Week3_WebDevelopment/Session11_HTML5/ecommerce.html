<!DOCTYPE html>
<html>
<head>
<title>Ecommerce Filters</title>
</head>
<body>

<h2>Product Filters</h2>

<label>Price Range</label>
<input type="range" min="0" max="10000">

<label>Brand</label>
<select>
<option>Apple</option>
<option>Samsung</option>
<option>HP</option>
</select>

<label>Color</label>
<input type="color">

<label>Rating</label>
<select>
<option>4★+</option>
<option>3★+</option>
</select>

</body>
</html>
