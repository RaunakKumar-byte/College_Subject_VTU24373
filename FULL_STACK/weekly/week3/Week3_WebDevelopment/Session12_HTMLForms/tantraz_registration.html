<!DOCTYPE html>
<html>
<head>
<title>Tantraz Registration</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Tantraz Event Registration</h2>

<form>

<label for="fullname">Full Name</label>
<input type="text" id="fullname" required placeholder="Enter full name">

<label for="email">Email</label>
<input type="email" id="email" required>

<label for="category">Participation Category</label>
<select id="category" required>
<option value="">Select Category</option>
<option>Individual</option>
<option>Team</option>
<option>Audience</option>
</select>

<h3>T-Shirt Size</h3>
<label><input type="radio" name="size" value="S"> S</label>
<label><input type="radio" name="size" value="M"> M</label>
<label><input type="radio" name="size" value="L"> L</label>
<label><input type="radio" name="size" value="XL"> XL</label>

<h3>Technical Interests</h3>
<label><input type="checkbox" name="interests" value="AI"> AI</label>
<label><input type="checkbox" name="interests" value="Web Dev"> Web Dev</label>
<label><input type="checkbox" name="interests" value="Cloud Computing"> Cloud Computing</label>

<h3>Suggestions</h3>
<textarea id="suggestions" maxlength="200" placeholder="Write suggestions"></textarea>

<br><br>

<button type="submit">Submit</button>

</form>

</body>
</html>
</html>
