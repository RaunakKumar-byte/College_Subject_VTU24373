<!DOCTYPE html>
<html>
<head>
<title>Tantraz Registration</title>
</head>
<body>

<h2>Tantraz Event Registration</h2>

<form>

<label>Full Name</label>
<input type="text" required placeholder="Enter full name">

<label>Email</label>
<input type="email" required>

<label>Participation Category</label>
<select required>
<option>Individual</option>
<option>Team</option>
<option>Audience</option>
</select>

<h3>T-Shirt Size</h3>

<input type="radio" name="size">S
<input type="radio" name="size">M
<input type="radio" name="size">L
<input type="radio" name="size">XL

<h3>Technical Interests</h3>

<input type="checkbox">AI
<input type="checkbox">Web Dev
<input type="checkbox">Cloud Computing

<h3>Suggestions</h3>

<textarea maxlength="200" placeholder="Write suggestions"></textarea>

<br><br>

<button type="submit">Submit</button>

</form>

</body>
</html>
