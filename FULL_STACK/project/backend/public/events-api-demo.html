<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Events API demo (same origin)</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="fade-in" style="padding: 2rem;">
  <h1>GET /api/events demo</h1>
  <p>Log in first at <a href="/login">/login</a>, then reload this page. JSON is loaded with <code>credentials: "same-origin"</code>.</p>
  <pre id="out" class="content-card" style="white-space: pre-wrap;"></pre>
  <script>
    fetch("/api/events", { credentials: "same-origin" })
      .then((r) => r.json())
      .then((data) => {
        document.getElementById("out").textContent = JSON.stringify(data, null, 2);
      })
      .catch((e) => {
        document.getElementById("out").textContent = "Error: " + e.message;
      });
  </script>
</body>
</html>
